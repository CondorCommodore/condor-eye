<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Condor Eye</title>
</head>
<body>
  <!-- Header / drag bar -->
  <div id="drag-handle">
    <span class="header-title">Condor Eye</span>
    <span class="header-spacer"></span>
    <button id="minimize-btn" title="Minimize">_</button>
    <button id="close-btn" title="Close">x</button>
  </div>

  <!-- Capture frame border — the transparent center is the capture zone -->
  <div id="frame"></div>

  <!-- Focus box — draggable/resizable highlight region inside the capture frame -->
  <div id="focus-box" class="hidden">
    <div id="focus-label">FOCUS</div>
  </div>

  <!-- Drawing canvas — overlays the capture frame for pen annotations -->
  <canvas id="draw-canvas"></canvas>

  <!-- Results panel (slides up from toolbar) -->
  <div id="results" class="hidden">
    <div id="results-header">
      <span id="result-badge"></span>
      <span id="result-summary"></span>
      <button id="close-results">x</button>
    </div>
    <div id="result-details"></div>
    <div id="result-meta"></div>
  </div>

  <!-- Bottom control panel -->
  <div id="toolbar">
    <div class="toolbar-row">
      <input id="prompt-input" type="text" placeholder="What to look for..." spellcheck="false">
      <button id="focus-toggle" title="Toggle focus box">[ ]</button>
      <button id="pen-toggle" title="Toggle drawing pen">✎</button>
      <button id="pen-color" title="Cycle pen color"></button>
      <button id="pen-clear" title="Clear all drawings">✕</button>
      <button id="capture-btn">Capture</button>
    </div>
    <div class="toolbar-row">
      <span id="capture-dest" title="Click to cycle destination">API</span>
      <span id="status">Ready</span>
      <span class="shortcut-hint">Ctrl+Shift+C</span>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
